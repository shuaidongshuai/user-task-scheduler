server:
  port: 8099

spring:
  datasource:
    url: ${DEMO_DB_URL:jdbc:mysql://127.0.0.1:3306/scheduler_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=SYSTEM&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DEMO_DB_USERNAME:root}
    password: ${DEMO_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${DEMO_DB_POOL_NAME:scheduler-hikari}
      minimum-idle: ${DEMO_DB_MIN_IDLE:12}
      maximum-pool-size: ${DEMO_DB_MAX_POOL_SIZE:40}
      # Keep maxLifetime safely below common MySQL wait_timeout settings.
      max-lifetime: ${DEMO_DB_MAX_LIFETIME_MS:540000}
      idle-timeout: ${DEMO_DB_IDLE_TIMEOUT_MS:300000}
      # Periodically ping idle connections so middleboxes/MySQL won't drop them silently.
      keepalive-time: ${DEMO_DB_KEEPALIVE_MS:120000}
      validation-timeout: ${DEMO_DB_VALIDATION_TIMEOUT_MS:5000}
      connection-timeout: ${DEMO_DB_CONNECTION_TIMEOUT_MS:10000}
      initialization-fail-timeout: ${DEMO_DB_INIT_FAIL_TIMEOUT_MS:1}
      leak-detection-threshold: ${DEMO_DB_LEAK_DETECT_MS:0}
  data:
    redis:
      host: 127.0.0.1
      port: 6379

scheduler:
  enabled: true
  dispatch-interval-ms: 500
  recovery-interval-ms: 10000
  queue-refill-interval-ms: 10000
  worker-threads: 8
  heartbeat-interval-sec: 5
  default-retry-delay-sec: 5
  default-execute-timeout-sec: 60
  timeout-interrupt-grace-sec: 5

logging:
  level:
    org.dong.scheduler: INFO
    org.dong.demo: DEBUG
